      Live tested against running server. Findings drove 5 architectural changes:

      1. **Subagent budget-consciousness**: Refusal + conversational subagent prompts updated to stay
         on-topic and not write manga scripts / do homework on our API budget.
      2. **Game-theoretic tit-for-tat refusal**: Orchestrator now returns a static response for refusal
         routing — zero LLM call, zero subagent tokens. After first refusal, subsequent adversarial
         messages get empty response (no chat bubble). User earns cooperation back with genuine messages.
      3. **Rewrite hallucination fix**: Amygdala system prompt now explicitly forbids fabricating content
         in rewrites — "only REMOVE things, never ADD things the user did not say."
      4. **Amygdala cost tracking**: generateObject usage now captured and recorded in spend tracker.
         Previously amygdala API calls were invisible to spend tracking.
      5. **Rate limit auto-refresh**: RateLimitIndicator now resets to full capacity after window expires,
         even when idle. Rate limit reduced from 20 RPM to 5 RPM.

