      use-chat.ts handles token-budget:update SSE event, exposes tokenBudget state in return
      value. Ready for ContextBudgetBar component in session 14.

      **Design decision:** Skipped countTokens pre-request API for v1. Using only onFinish
      actual usage — simpler, no extra API call latency, no new SDK dependency. Can add
