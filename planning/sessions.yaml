  - id: 24
    title: "Memory Research + Design"
    date: 2026-03-19
    milestone: agent-memory
    status: done
    goal: "Survey agent memory architectures, design the type system (capsule-shaped), amygdala-as-ℒ=ℬ-gate integration, persistence layer, and attack surface defenses. Output: design doc grounded in SDI spec."
    phases:
      - name: "Prior art survey ✓"
        tasks: [mem-01]
        status: done
      - name: "Type system + amygdala protocol ✓"
        tasks: [mem-02, mem-03]
        status: done
      - name: "Persistence + security ✓"
        tasks: [mem-04, mem-05]
        status: done
    summary: |
      Research + design session. No code changes. Produced comprehensive design doc
      at designs/memory-architecture.md covering all 5 research tasks.

      **Prior art survey (mem-01):**
      Surveyed 6 systems via parallel research agents: MemGPT/Letta, Generative Agents
      (Park et al.), LangMem, Zep/Graphiti, Mem0, Cognee. Plus internal mmogit notes
      and calibration memory. Key finding: memory-as-tool is an established pattern
      (Letta's 7 tools, LangMem's 2 tools), but NO existing system combines tool
      interface + typed entries + provenance + uncertainty + metabolism + visibility.
      That's the gap our design fills.

      **Type system (mem-02):**
      4 types for v1: observation, learning, relationship, reflection. Each mapped to
      SDI modality (observation/belief/claim/hypothesis). Capsule-shaped entries from
      day one: id, provenance (agent/timestamp/used/source), modality, uncertainty,
      visibility, tags, supersededBy, accessCount. Deduplication per type with
      confidence reinforcement. Post/remember duality (low-cost reads vs high-cost writes).

      **PersistentState + createMemoryTools (mem-03):**
      Polymorphic PersistentState interface (recall/remember/stats). JsonFilePersistentState
      for v1. createMemoryTools factory returning memory_recall + memory_remember as
      defineTool instances. UCAN mapping: recall=capsule/read, remember=capsule/write.
      Tool scoping: subagents get memory_recall only, orchestrator mediates writes.

      **Amygdala integration (mem-04):**
      Option B confirmed. Pipeline: recall→amygdala(memoryContext)→orchestrator→subagent→
      write(gated by threatLevel). Threat score IS L.magnitude. Write threshold IS Bβ.width.
      Four threat bands: <0.3 full write, 0.3-0.49 write with elevated uncertainty,
      0.5-0.79 no write, ≥0.8 refusal. Path to Option C documented (4 phases).

      **Security analysis (mem-05):**
      5 attack vectors identified (direct poisoning, social engineering, slow-burn drift,
      recall-time exploitation, training data poisoning). SDI pre-merge gate sequence
      mapped to v1 (7 gates, 4 implemented, 3 deferred). Defenses: write gating (Gate 5),
      recall-time filtering (Gate 3 at read), confidence decay (compounds uncertainty on
      mildly suspicious interactions), visibility quarantine (research class).

      **tools-as-ontology validation:**
      All 7 testable theory claims validated. Memory IS a tool. Capsule-shaped entries
      work. Amygdala IS an L=B gate. PersistentState IS polymorphic. Post/remember
      duality maps to SDI affect. Metabolism replaces deletion.

      **Unblocked:** Session 25 (implementation). Design doc is the spec.

