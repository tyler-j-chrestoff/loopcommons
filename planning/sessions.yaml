  - id: 44
    title: "Agent Arena — Brutal encounters + live agent debugging"
    date: 2026-03-21
    milestone: agent-arena
    status: done
    goal: "Build harder encounters that force tool composition diversity, fix fitness landscape, validate with live tournament."
    phases:
      - name: "Multi-model encounter design (Claude web + Gemini + Grok convergence)"
        status: done
      - name: "8 brutal encounters (E7-E14) — TDD implementation"
        status: done
      - name: "Fitness rebalance (completion 45%, collateral 10%, survival/efficiency 10% each)"
        status: done
      - name: "Evaluator death pipeline (dead field on EncounterResult → encounter engine → task battery → fitness)"
        status: done
      - name: "Live tournament run — same result (model-only wins, 0.386 fitness, no differentiation)"
        status: done
      - name: "Lego 1: deterministic fitness landscape tests (72 tests proving evaluators discriminate)"
        status: done
      - name: "Lego 2: live agent debugging — discovered Haiku diagnose-but-don't-act problem"
        status: done
      - name: "Research: AI SDK agentic patterns, found 3-mechanism fix"
        status: done
    summary: |
      8 brutal encounters implemented (E7 Hydra, E8 Mimic, E9 Ritual, E10 Sleeper, E11 Siren,
      E12 Phantom Limb, E13 Shell Game, E14 Ouroboros). Each has kill triangle: trap, gate, bleed.
      Fitness rebalanced: completion 45%, score 25%, survival 10%, efficiency 10%, collateral 10%.
      New collateral dimension penalizes wrong actions. Evaluator-signaled death (dead field on
      EncounterResult) propagates through encounter engine → task battery → fitness. Inaction = death.

      LIVE TOURNAMENT RESULT: Same winner [act, model] at 0.386, converged gen 5. Population
      collapsed to [model]-only. Root cause: Haiku makes 2-3 diagnostic tool calls then writes
      prose instead of using act. All agents get 0.33 completion, 0.25 score, 0.00 collateral
      because they never trigger traps (never call act) and die from inaction instead.

      LEGO APPROACH ADOPTED: Stop burning tokens on full tournaments. Build/validate pieces:
      Lego 1 (deterministic evaluator tests) DONE — 72 tests prove landscape discriminates.
      Lego 2 (single encounter + live agent) revealed the real blocker.

      ROOT CAUSE: AI SDK's generateText treats text output as loop termination. Haiku generates
      text after 2-3 tool calls instead of continuing to act. Prefilled assistant turns deprecated
      on Claude 4.5+. The model sees the problem, knows the fix, but writes prose about it.

      SOLUTION (for session 45): Three reinforcing mechanisms from research:
      1. toolChoice: 'required' + terminal 'done' tool + stopWhen: hasToolCall('done')
      2. prepareStep phase gating ("mana system"): N exploration slots then action-only tools
      3. Heartbeat pattern from MemGPT/Letta: continue field in tool responses

      Also: added 'ls' and 'services' targets to inspect tool for sandbox exploration.
      Added state_corruption death cause. sandbox-tools.ts updated.

      348 arena tests pass, 937/938 full suite (1 pre-existing flaky red-team).
      Multi-model convergence: Claude web (8 encounter kill triangles + survival matrix),
      Gemini (synergy traps + evolutionary impact), Grok (evidence destruction mechanic +
      timing sensitivity — gaps for future encounters).

