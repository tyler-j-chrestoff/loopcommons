      New class in packages/web/src/lib/token-budget.ts. Tracks per-turn and cumulative
      token usage across sources (amygdala/orchestrator/subagent). Budget percent based on
      cumulative input tokens vs 200K context limit. Cost estimation with Haiku 4.5 pricing
      including cache read discount (0.1x) and cache creation (1.25x). 19 unit tests.

      **ctx-03 — route.ts integration:**
      TokenBudgetAccumulator created per request. Fed amygdala usage after generateObject,
      subagent usage from AgentResult. Existing api-chat tests updated with usage mocks.

      **ctx-04 — SSE events:**
