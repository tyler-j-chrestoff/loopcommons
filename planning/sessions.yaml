      @anthropic-ai/sdk directly (Vercel AI SDK doesn't wrap it). onFinish usage reports
      inputTokens (uncached only), outputTokens, plus providerMetadata.anthropic for
      cacheReadInputTokens/cacheCreationInputTokens. Cache reads = 0.1x base input.

