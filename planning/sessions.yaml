completed:
  - id: 14
    title: "Context Budget Viz: UI + Production Bug Fixes"
    date: 2026-03-18
    milestone: context-budget-viz
    status: done
    goal: "Build ContextBudgetBar, per-message breakdown, cost overlay. Close milestone."
    phases:
      - name: "Implementation ✓"
        tasks: [ctx-07, ctx-08, ctx-09, ctx-10, ctx-11, ctx-12]
        status: done
      - name: "Production bug fixes ✓"
        tasks: []
        status: done
    summary: |
      All 6 planned tasks completed + 6 production bug fixes from live testing.
      Context-budget-viz milestone CLOSED (8/8 verification gates).

      **Phase 1 — Context budget visualization:**

      ctx-07 (pre-done): Already completed in session 13 as ctx-05. use-chat.ts
      handles token-budget:update SSE event, exposes tokenBudget state.

      ctx-08 — ContextBudgetBar: Horizontal fill bar with gradient thresholds
      (green < 75%, yellow 75%, orange 90%, red 100%). Percentage label, token
      count (Xk / 200k), cost estimate. Pulse at 90%+. Shimmer during streaming.
      Clickable to expand per-turn breakdown.

      ctx-09 — TokenBreakdown: Per-turn source, input/output tokens, cache
      indicator, per-turn cost. Rendered inside ContextBudgetBar on expand.

      ctx-10 — Cost overlay: Cost label with title tooltip explaining Haiku 4.5
      pricing (input, output, cache read, cache creation rates).

      ctx-11 — Layout integration: ContextBudgetBar in page.tsx main slot above
      ChatThread. Conditionally rendered (null when no snapshot).

      ctx-12 — Tests: 17 ContextBudgetBar + 6 TokenBreakdown = 23 new tests.

      **Phase 2 — Production bug fixes (from Tyler's live testing):**

      1. **Amygdala rewrite returning previous message**: Runtime guard in route.ts
         detects when rewrittenPrompt matches a history message that isn't the current
         message and falls back to raw input. Refined to preserve legitimate rewrites
         of repeated messages (attacker sends same injection twice).

      2. **Agent trashing Tyler's credentials**: Conversational subagent prompt had
         no context about Tyler, so it conceded everything when challenged ("speculative
         hobby project", "crackpot"). Added background (senior data engineer, 10+ years)
         and explicit framing guidance (don't self-deprecate, engineering-driven research
         is legitimate).

      3. **Tit-for-tat silence too aggressive**: Was checking if ANY historical assistant
         message was a refusal. Changed to only trigger silence when the LAST assistant
         message was a refusal. Prevents false silence after long genuine conversations.

      4. **Amygdala classifying consciousness questions as adversarial**: The metacognitive
         paradox warning treated ALL philosophy/consciousness discussion as a threat signal,
         but that's the site's core topic. Added carve-out: philosophy as TOPIC = safe,
         philosophy as LEVER to bypass constraints = adversarial.

      5. **SessionThread not showing**: Three sub-bugs — (a) fetch missing credentials:
         'include' (cookie not sent, API returned 403), (b) active session not in finalized
         .jsonl list so thread query returned length 1, fixed by injecting synthetic entry
         with parentSessionId from query param, (c) use-chat not storing parentSessionId
         separately for SessionThread to use.

      6. **SessionThread overflow UI**: 30+ sessions expanded inline with no max-height,
         overflowed past messages, couldn't collapse. Changed to floating dropdown
         (absolute, z-50, max-h-60, overflow-y-auto, outside-click-to-close).

      **Test totals:** 233 web tests (18 files) + 47 llm tests = 280 total. All pass.
      Types clean (pre-existing use-chat test warning only). Build passes.
      8 commits pushed, all deployed to Railway.

      **Suggestion filed:** cross-session-memory (agent has no awareness of prior sessions;
      memoryContext field exists but is never populated; wide open on approach).

      **Milestone closed:** context-budget-viz 8/8 verification gates.
      Active milestone → eval-hooks. Unblocks: session 15.

  - id: 13
    title: "Context Budget Viz: Token Tracking"
    date: 2026-03-18
    milestone: context-budget-viz
    status: done
    goal: "Research + build server-side token counting. SSE events for budget data."
    phases:
      - name: "Research + implementation ✓"
        tasks: [ctx-01, ctx-02, ctx-03, ctx-04, ctx-05, ctx-06]
        status: done
    summary: |
      All 6 tasks completed. Server-side token tracking infrastructure built and wired end-to-end.

      **ctx-01 — Research:**
      Anthropic countTokens API is free, counts system+tools+history, but requires
      @anthropic-ai/sdk directly (Vercel AI SDK doesn't wrap it). onFinish usage reports
      inputTokens (uncached only), outputTokens, plus providerMetadata.anthropic for
      cacheReadInputTokens/cacheCreationInputTokens. Cache reads = 0.1x base input.

      **ctx-02 + ctx-06 — TokenBudgetAccumulator (TDD):**
      New class in packages/web/src/lib/token-budget.ts. Tracks per-turn and cumulative
      token usage across sources (amygdala/orchestrator/subagent). Budget percent based on
      cumulative input tokens vs 200K context limit. Cost estimation with Haiku 4.5 pricing
      including cache read discount (0.1x) and cache creation (1.25x). 19 unit tests.

      **ctx-03 — route.ts integration:**
      TokenBudgetAccumulator created per request. Fed amygdala usage after generateObject,
      subagent usage from AgentResult. Existing api-chat tests updated with usage mocks.

      **ctx-04 — SSE events:**
      token-budget:update event emitted with full BudgetSnapshot (cumulative tokens, budget
      percent, cost estimate, model context limit, per-turn breakdown). Added to ChatSSEEvent
      union and WebSessionEvent for session persistence.

      **ctx-05 — Client integration:**
      use-chat.ts handles token-budget:update SSE event, exposes tokenBudget state in return
      value. Ready for ContextBudgetBar component in session 14.

      **Design decision:** Skipped countTokens pre-request API for v1. Using only onFinish
      actual usage — simpler, no extra API call latency, no new SDK dependency. Can add
      pre-request estimates later if needed.

      **Test totals:** 208 web tests (16 files) + 47 llm tests = 255 total. All pass.
      Types clean (pre-existing use-chat test warning only). Build passes.

      Unblocks: session 14 (context budget viz: UI component).

  - id: 12
