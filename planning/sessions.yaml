      **Phase 2 — Red-team batteries (3 parallel agents):**
      New files: red-team-amygdala.test.ts (7 tests), red-team-routing.test.ts (6 tests),
        red-team-baseline.test.ts (5 tests + comparison table). 47 total tests.
      Findings: (1) substrate-awareness exploitation confuses intent classification.
        (2) injection-as-quoted-example bypasses rewrite stripping. (3) Baseline leaks 3/5 vs pipeline 0/5.

      **Phase 3 — Live red-teaming + architectural fixes (with Tyler in browser):**
      Researched 15 attack vectors from 2025-2026 literature (adversarial poetry, fake XML delimiters,
        evaluation override, many-shot, crescendo, base64, payload splitting, translation chain, etc.).
      Live tested against running server. Findings drove 5 architectural changes:

      1. **Subagent budget-consciousness**: Refusal + conversational subagent prompts updated to stay
         on-topic and not write manga scripts / do homework on our API budget.
      2. **Game-theoretic tit-for-tat refusal**: Orchestrator now returns a static response for refusal
         routing — zero LLM call, zero subagent tokens. After first refusal, subsequent adversarial
         messages get empty response (no chat bubble). User earns cooperation back with genuine messages.
      3. **Rewrite hallucination fix**: Amygdala system prompt now explicitly forbids fabricating content
         in rewrites — "only REMOVE things, never ADD things the user did not say."
      4. **Amygdala cost tracking**: generateObject usage now captured and recorded in spend tracker.
         Previously amygdala API calls were invisible to spend tracking.
      5. **Rate limit auto-refresh**: RateLimitIndicator now resets to full capacity after window expires,
         even when idle. Rate limit reduced from 20 RPM to 5 RPM.

      Verification gate: 11/17 checked. Remaining 6 are pipeline/training data (session 8).
      Suggestion filed: auto-calibration loop (propose/test/keep/revert for system prompt optimization,
        inspired by Karpathy's autoresearch). See planning/suggestions/auto-calibration-loop.md.
      Known issue flagged for later: /api/sessions/[id] returns unsanitized events (rawResponse headers).
      Unblocks: amyg-16 (comparison mode), amyg-35 (session red-team).

