    summary: |
      Planning session. 4 milestones planned with 10 stories and 73 tasks total.

      **Milestones created:**
      1. deploy-ops: 3 stories, 24 tasks (railway deploy, session linking, web test expansion)
      2. context-budget-viz: 2 stories, 12 tasks (token tracking, budget visualization)
      3. eval-hooks: 3 stories, 22 tasks (user feedback, LLM-as-judge, CI evals)
      4. auto-calibration: 2 stories, 15 tasks (calibration runner, calibration viz)

      **Research conducted (3 parallel agents):**
      - Context budget viz: confirmed novel. No widely-used open-source tool does real-time
        context budget visualization in chat UI. Vercel AI Elements Context component is
        closest (hover card). Anthropic countTokens API + onFinish for accurate tracking.
      - Later backlog: 7 items assessed. Eval hooks → context engineering → trace comparison
        is recommended sequence. A/B testing and cost routing need eval hooks first.
        Unsloth fine-tuning deferred (needs more training data volume).
