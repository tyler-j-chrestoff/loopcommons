[project]
name = "loopcommons-pipeline"
version = "0.1.0"
description = "Dagster + dbt pipeline: raw trace events → labeled training data"
requires-python = ">=3.11,<3.14"
dependencies = [
    "dagster>=1.12,<2.0",
    "dagster-webserver>=1.12,<2.0",
    "dagster-dbt>=0.28,<1.0",
    "dagster-duckdb>=0.28,<1.0",
    "dbt-duckdb>=1.9,<2.0",
    "polars>=1.0,<2.0",
    "duckdb>=1.1,<2.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
]

[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
include = ["loopcommons_pipeline*"]

[tool.dagster]
module_name = "loopcommons_pipeline"
